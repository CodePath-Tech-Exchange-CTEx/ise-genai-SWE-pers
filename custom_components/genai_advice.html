<!-- CSS -->
<style>
    .advice-container {
        display: flex;
        flex-direction: column;
        align-items: center;
        border-radius: 12px;
        padding: 24px;
        background-color: #1e1e1e;
        margin: 0;
        box-sizing: border-box;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }

    .advice-image {
        width: 100%;
        max-width: 600px;
        height: 400px;
        object-fit: cover;
        border-radius: 8px;
        margin-bottom: 16px;
    }

    .advice-timestamp {
        font-size: 13px;
        color: #888;
        margin-bottom: 12px;
    }

    .advice-content {
        font-size: 16px;
        line-height: 1.5;
        color: #e0e0e0;
        text-align: center;
        max-width: 560px;
        margin: 0;
    }
</style>

<!-- HTML -->
<div class="advice-container">
    <img src="{{image}}" class="advice-image" alt="motivational-image" />
    <span class="advice-timestamp">{{timestamp}}</span>
    <p class="advice-content">{{content}}</p>
</div>
