<!-- CSS -->
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  .summary-container {
    border-radius: 12px;
    padding: 24px;
    background-color: #1e1e1e;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    color: #e0e0e0;
  }

  .summary-cards {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 12px;
    margin-bottom: 20px;
  }

  .card {
    background-color: #2a2a2a;
    border-radius: 8px;
    padding: 16px;
  }

  .card-title {
    font-size: 12px;
    color: #888;
    margin-bottom: 4px;
  }

  .card-value {
    font-size: 22px;
    font-weight: 700;
    color: #fafafa;
  }

  .workouts-label {
    font-size: 13px;
    color: #888;
    margin-bottom: 10px;
  }

  table {
    width: 100%;
    border-collapse: collapse;
  }

  th, td {
    padding: 10px 8px;
    text-align: left;
    font-size: 13px;
    border-bottom: 1px solid #2a2a2a;
  }

  th {
    color: #888;
    font-weight: 500;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }

  td {
    color: #e0e0e0;
  }
</style>

<!-- HTML -->
<div class="summary-container">
  <div class="summary-cards">
    <div class="card">
      <div class="card-title">Workouts</div>
      <div class="card-value">{{TOTAL_WORKOUTS}}</div>
    </div>
    <div class="card">
      <div class="card-title">Distance</div>
      <div class="card-value">{{TOTAL_DISTANCE}} km</div>
    </div>
    <div class="card">
      <div class="card-title">Steps</div>
      <div class="card-value">{{TOTAL_STEPS}}</div>
    </div>
    <div class="card">
      <div class="card-title">Calories</div>
      <div class="card-value">{{TOTAL_CALORIES}}</div>
    </div>
  </div>

  <div class="workouts-label">Recent workouts</div>

  <table>
    <thead>
      <tr>
        <th>Start</th>
        <th>End</th>
        <th>Dist</th>
        <th>Steps</th>
        <th>Cal</th>
      </tr>
    </thead>
    <tbody>
      {{WORKOUT_ROWS}}
    </tbody>
  </table>
</div>
